<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright Demo</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      code { background: #f4f4f4; padding: 0.25rem 0.5rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Playwright Server Demo</h1>
    <p>This page is served by the Playwright app server.</p>
    <p id="status">Checking API status...</p>
    <script>
      fetch('/api/echo')
        .then((res) => res.json())
        .then((data) => {
          document.getElementById('status').textContent = data.message;
        })
        .catch((err) => {
          document.getElementById('status').textContent = 'Unable to reach API';
          console.error(err);
        });
    </script>
  </body>
</html>
